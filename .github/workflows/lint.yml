name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"

      # Lint without resolving the full (CUDA/materials) dependency tree —
      # ruff is the only thing this job needs.
      - name: Ruff lint
        run: uvx ruff@0.4.0 check src/ tests/ scripts/

      - name: Ruff format check
        run: uvx ruff@0.4.0 format --check src/ tests/ scripts/
