# Base experiment configuration (Hydra).
# Override any field on the command line, e.g.:
#   make train ARGS="reward.w_topology=0.5 train.total_steps=200000"

seed: 42

paths:
  data_raw: data/raw
  data_processed: data/processed
  pretrained: models/pretrained
  checkpoints: models/checkpoints
  results: results

# Element filtering: favor light elements (Li=3 .. Si=14) to reduce DFT cost.
composition:
  min_z: 3
  max_z: 14
  max_atoms_per_cell: 20

# Pretrained model handles (resolved by scripts/download_models.py).
models:
  generator: mattergen      # crystal structure generator (isolated env)
  topology: spillage_gnn    # DGL-free spillage regressor trained on JARVIS (matgl/MACE)
  stability: m3gnet         # M3GNet-Eform-MP-2018.6.1 via matgl (pretrained)

# Multi-objective reward weights. Must be tuned against the Pareto front
# during weeks 4-5; these are starting points.
reward:
  w_topology: 0.40          # P(topological)
  w_dos_fermi: 0.30         # density of states at E_F (superconductive tendency)
  w_formation: 0.20         # formation energy (stability / synthesizability)
  w_composition: 0.10       # light-element preference penalty
  formation_energy_cutoff: 0.10   # eV/atom above hull considered synthesizable

# PPO / MatInvent training.
train:
  algorithm: ppo
  total_steps: 100000
  n_envs: 8
  batch_size: 256
  learning_rate: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  kl_target: 0.02           # KL to the pretrained prior; key stability knob
  checkpoint_every: 5000

logging:
  mlflow_experiment: synth-q-mat
  log_every: 100
