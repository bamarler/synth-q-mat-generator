# Run `uv run pre-commit install` once to enable these on every commit.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=5000]   # block accidental commits of weights/data (use DVC)
        exclude: ^references/papers/.*\.pdf$   # reference PDFs are intentional
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: check-docstrings
        name: no module docstrings, snippet-length docstrings
        entry: python scripts/check_docstrings.py
        language: python
        types: [python]
