stages:
  hull-cache:
    cmd: SQMG_DVC=1 python -m synth_q_mat.data.hull_cache
    deps:
      - src/synth_q_mat/data/hull_cache.py
      - src/synth_q_mat/config.py
      - data/raw/mp_summary.parquet
    params:
      - composition
    outs:
      - data/processed/hull_eform.parquet

  baseline:
    cmd: SQMG_DVC=1 python -m synth_q_mat.eval.baseline
    deps:
      - src/synth_q_mat/eval/baseline.py
      - src/synth_q_mat/models/generator.py
      - src/synth_q_mat/models/stability.py
      - src/synth_q_mat/models/evaluator.py
      - src/synth_q_mat/rl/reward
      - src/synth_q_mat/config.py
      - data/processed/hull_eform.parquet
    params:
      - seed
      - reward
      - generate
      - composition
      - models
    outs:
      - results/candidates.json
    metrics:
      - results/metrics/baseline.json:
          cache: false

  train:
    cmd: SQMG_DVC=1 python -m synth_q_mat.rl.train
    deps:
      - src/synth_q_mat/rl/train.py
      - src/synth_q_mat/rl/reward
      - src/synth_q_mat/config.py
    params:
      - seed
      - reward
      - train
      - composition
      - models
    outs:
      - models/checkpoints:
          persist: true
    metrics:
      - results/metrics/train.json:
          cache: false

  eval:
    cmd: SQMG_DVC=1 python -m synth_q_mat.eval.evaluate
    deps:
      - src/synth_q_mat/eval/evaluate.py
      - src/synth_q_mat/config.py
      - results/candidates.json
    params:
      - seed
      - reward
    metrics:
      - results/metrics/eval.json:
          cache: false

  viz:
    cmd: SQMG_DVC=1 python -m synth_q_mat.viz.generate
    deps:
      - src/synth_q_mat/viz/generate.py
      - src/synth_q_mat/config.py
      - results/candidates.json
    outs:
      - results/figures
