
# Faceted tag index for the reference corpus.
# Single source of truth: scripts/extract_paper.py reads this to build the
# YAML frontmatter prepended to each references/text/<key>.md.
#
# Facets:
#   primary      human-browsing bucket(s)
#   role         function in this project's pipeline
#   status       adopted | rejected | candidate | context (+ -lineage / -concept / -cautionary / -template / -baseline qualifiers)
#   reward_term  which reward signal it informs: topology | superconductivity | stability | composition | multi
#   domain       ml | physics | chem | software
#   tags         free-text keywords for grep/RAG matching
#   one_liner    short description (also used as `summary:` in frontmatter)

